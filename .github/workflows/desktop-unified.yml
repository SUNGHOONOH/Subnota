name: desktop-unified

on:
  push:
    branches: [main]
    paths:
      - 'desktop/**'
      - '.github/workflows/desktop-unified.yml'
  pull_request:
    paths:
      - 'desktop/**'
      - '.github/workflows/desktop-unified.yml'
  workflow_dispatch:

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: desktop/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit
      - run: pnpm test
      - run: pnpm run lint
      - if: runner.os == 'macOS'
        run: pnpm build:mac
      - if: runner.os == 'Windows'
        run: pnpm build:windows
      - if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: subnota-windows
          path: desktop/out/make/**/*.exe
          if-no-files-found: error
