<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Subnota Capture Settings</title>
    <style>
      body {
        background: #faf6f0;
        color: #1f1d1a;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 24px;
      }

      main {
        background: #fffdf8;
        border: 1px solid #e5ddd0;
        border-radius: 16px;
        max-width: 520px;
        padding: 20px;
      }

      label {
        display: block;
        font-size: 13px;
        font-weight: 800;
        margin-bottom: 8px;
      }

      input {
        border: 1px solid #d8ccbb;
        border-radius: 12px;
        box-sizing: border-box;
        font: inherit;
        padding: 12px;
        width: 100%;
      }

      button {
        background: #1f1d1a;
        border: 0;
        border-radius: 12px;
        color: #fffaf2;
        font: inherit;
        font-weight: 900;
        margin-top: 12px;
        padding: 12px 16px;
      }

      p {
        color: #736657;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Subnota Capture</h1>
      <p>현재 탭 저장 단축키가 열 Subnota PWA 주소를 설정합니다.</p>
      <label for="appUrl">Subnota PWA URL</label>
      <input id="appUrl" placeholder="https://subnota.com" type="url" />
      <button id="saveButton" type="button">저장</button>
      <p id="status"></p>
    </main>
    <script src="options.js"></script>
  </body>
</html>
